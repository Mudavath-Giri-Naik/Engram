frr defaults traditional
hostname r2
no ipv6 forwarding
service integrated-vtysh-config
!
interface lo
 ip address 10.0.0.2/32
!
router bgp 65002
 bgp router-id 10.0.0.2
 no bgp ebgp-requires-policy
 neighbor 172.20.0.11 remote-as 65001
 neighbor 172.20.0.11 timers 3 9
 address-family ipv4 unicast
  redistribute connected
  neighbor 172.20.0.11 activate
 exit-address-family
!
line vty
!
