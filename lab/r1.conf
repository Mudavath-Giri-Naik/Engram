frr defaults traditional
hostname r1
no ipv6 forwarding
service integrated-vtysh-config
!
interface lo
 ip address 10.0.0.1/32
!
router bgp 65001
 bgp router-id 10.0.0.1
 no bgp ebgp-requires-policy
 neighbor 172.20.0.12 remote-as 65002
 neighbor 172.20.0.12 timers 3 9
 address-family ipv4 unicast
  redistribute connected
  neighbor 172.20.0.12 activate
 exit-address-family
!
line vty
!
