# Render Blueprint — deploy the Engram API + a managed Postgres in one click.
# Qdrant: use a free Qdrant Cloud cluster (https://cloud.qdrant.io) and set
# QDRANT_URL + QDRANT_API_KEY below (Render has no managed Qdrant).
#
# Deploy: push this repo to GitHub, then in Render -> "New +" -> "Blueprint"
# and point it at the repo. Fill the values marked sync:false in the dashboard.

services:
  - type: web
    name: engram-api
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: engram-db
          property: connectionString
      - key: QDRANT_URL          # e.g. https://xxxx.qdrant.io:6333
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: gemini
      - key: LLM_MODEL
        value: gemini-2.5-flash
      - key: LLM_API_KEY
        sync: false
      - key: ENGRAM_BOOTSTRAP_API_KEY
        sync: false
      - key: ENGRAM_BOOTSTRAP_NETWORK_ID
        value: acme-core-network
      - key: EMBEDDING_MODEL
        value: hashing
      - key: CORS_ORIGINS        # your Vercel URL, e.g. https://engram.vercel.app
        sync: false

databases:
  - name: engram-db
    plan: free
