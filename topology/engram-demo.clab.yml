# Engram demo network — Containerlab + FRRouting (free, real routing).
#
# Two "sites" joined by eBGP, OSPF inside each site, two hosts.
#
#   Site A (AS 65001)            Site B (AS 65002)
#   ┌───────────────┐           ┌───────────────┐
#   │  R1 ── R2 ─────┼── eBGP ───┼──── R3 ── R4   │
#   │  │   (OSPF)    │           │    (OSPF)  │   │
#   │  h1            │           │            h2  │
#   └───────────────┘           └───────────────┘
#
# Addressing
#   R1-R2  10.0.12.0/24  (OSPF area 0)     R1 .1  R2 .2
#   R2-R3  10.0.23.0/24  (eBGP)            R2 .2  R3 .3
#   R3-R4  10.0.34.0/24  (OSPF area 0)     R3 .3  R4 .4
#   Loopbacks  R1 10.0.0.1/32 ... R4 10.0.0.4/32
#   h1 10.1.1.10/24 -> R1 (10.1.1.1)       h2 10.4.4.10/24 -> R4 (10.4.4.1)
#
# Deploy:  sudo containerlab deploy -t topology/engram-demo.clab.yml
# Destroy: sudo containerlab destroy -t topology/engram-demo.clab.yml --cleanup
#
# Node container names follow:  clab-engram-demo-<node>  (used by fault scripts).

name: engram-demo

topology:
  kinds:
    linux:
      image: quay.io/frrouting/frr:9.1.0
  nodes:
    R1:
      kind: linux
      binds:
        - configs/daemons:/etc/frr/daemons
        - configs/R1.conf:/etc/frr/frr.conf
      exec:
        - /usr/lib/frr/frrinit.sh start
    R2:
      kind: linux
      binds:
        - configs/daemons:/etc/frr/daemons
        - configs/R2.conf:/etc/frr/frr.conf
      exec:
        - /usr/lib/frr/frrinit.sh start
    R3:
      kind: linux
      binds:
        - configs/daemons:/etc/frr/daemons
        - configs/R3.conf:/etc/frr/frr.conf
      exec:
        - /usr/lib/frr/frrinit.sh start
    R4:
      kind: linux
      binds:
        - configs/daemons:/etc/frr/daemons
        - configs/R4.conf:/etc/frr/frr.conf
      exec:
        - /usr/lib/frr/frrinit.sh start

    h1:
      kind: linux
      image: wbitt/network-multitool:alpine-extra
      exec:
        - ip addr add 10.1.1.10/24 dev eth1
        - ip route replace default via 10.1.1.1
    h2:
      kind: linux
      image: wbitt/network-multitool:alpine-extra
      exec:
        - ip addr add 10.4.4.10/24 dev eth1
        - ip route replace default via 10.4.4.1

  links:
    - endpoints: ["R1:eth1", "R2:eth1"]   # 10.0.12.0/24  OSPF
    - endpoints: ["R2:eth2", "R3:eth2"]   # 10.0.23.0/24  eBGP
    - endpoints: ["R3:eth1", "R4:eth1"]   # 10.0.34.0/24  OSPF
    - endpoints: ["R1:eth2", "h1:eth1"]   # 10.1.1.0/24
    - endpoints: ["R4:eth2", "h2:eth1"]   # 10.4.4.0/24
